<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 64" width="360" height="64">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Figtree:wght@700;800;900&amp;display=swap');
      .logo-text {
        font-family: 'Figtree', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 24px;
        fill: #FFFFFF;
        letter-spacing: 1.5px;
      }
    </style>
    <filter id="whiteGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(6, 6)">
    <!-- ALL WHITE Infinity Icon Loop on Left -->
    <path d="M 28 26 C 14 10, 4 15, 4 26 C 4 37, 14 42, 28 26 C 42 10, 52 15, 52 26 C 52 37, 42 42, 28 26 Z"
          fill="none" stroke="#FFFFFF" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#whiteGlow)" />
    
    <!-- Accent White Inner Curve -->
    <path d="M 24 22 C 35 11, 48 14, 52 26 C 52 37, 42 42, 28 26"
          fill="none" stroke="#FFFFFF" stroke-width="6.5" stroke-linecap="round" opacity="0.9" />

    <!-- Pure White Tech Node Dots -->
    <circle cx="52" cy="26" r="3" fill="#FFFFFF" />
    <circle cx="4" cy="26" r="2.5" fill="#FFFFFF" />
    <circle cx="28" cy="26" r="2" fill="#FFFFFF" />

    <!-- Typography in exact Navbar font 'Figtree' -->
    <text x="74" y="35" class="logo-text">INFINITY TECH</text>
  </g>
</svg>
